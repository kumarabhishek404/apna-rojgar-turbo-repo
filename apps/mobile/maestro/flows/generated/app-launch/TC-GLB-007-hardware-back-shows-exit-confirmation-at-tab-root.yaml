    clearState: false
- runFlow: ../../helpers/login-worker.yaml

# Test steps (from manual case — adjust selectors if UI changes)
# Navigate to any bottom tab root.
- pressKey: back

# Assertions
# Expected: Exit confirmation modal appears.
# Expected: cancel stays in app.
# Expected: confirm exits.

