# Type: Availability | Priority: P1
# Route: /screens/placeholders/noInternet
# Prerequisites: Any test account · Disable Wi-Fi and mobile data
# Preconditions
- launchApp:
    clearState: false
- runFlow: ../../helpers/login-worker.yaml

# Test steps (from manual case — adjust selectors if UI changes)
# Turn off network.
# Open app or trigger API call.
# Observe UI.

# Assertions
# Expected: No internet message/placeholder visible.
- assertNotVisible: "Something went wrong"

