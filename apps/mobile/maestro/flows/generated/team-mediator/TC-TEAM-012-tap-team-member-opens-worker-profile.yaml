appId: com.kumarabhishek404.labourapp
env:
  STAGING_OTP: ${STAGING_OTP}
  WORKER_MOBILE: ${WORKER_MOBILE}
  EMPLOYER_MOBILE: ${EMPLOYER_MOBILE}
  MEDIATOR_MOBILE: ${MEDIATOR_MOBILE}
  ADMIN_MOBILE: ${ADMIN_MOBILE}
tags: ["team-mediator", "functionality", "mediator", "automated"]
---
# TC-TEAM-012: Tap team member opens worker profile
# Module: Team / Mediator | Screen: Team Detail | Role: Mediator
# Type: Functionality | Priority: P1
# Route: /screens/team/[id]
# Prerequisites: Mediator account · Team detail open
# Preconditions
- launchApp:
    clearState: false
- runFlow: ../../helpers/login-mediator.yaml

# Test steps (from manual case — adjust selectors if UI changes)
- tapOn: "a team member"

# Assertions
# Expected: Navigates to /screens/users/[id].

# Cleanup
# Optional: - runFlow: ../../helpers/logout.yaml
