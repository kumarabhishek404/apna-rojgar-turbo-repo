appId: com.kumarabhishek404.labourapp
env:
  STAGING_OTP: ${STAGING_OTP}
  WORKER_MOBILE: ${WORKER_MOBILE}
  EMPLOYER_MOBILE: ${EMPLOYER_MOBILE}
  MEDIATOR_MOBILE: ${MEDIATOR_MOBILE}
  ADMIN_MOBILE: ${ADMIN_MOBILE}
tags: ["authentication", "functionality", "guest", "manual-review"]
---
# TC-AUTH-003: Correct OTP logs in a user with complete profile and opens Home
# Module: Authentication | Screen: Login | Role: Guest
# Type: Functionality | Priority: P0
# Route: /screens/auth/login
# Prerequisites: Logged out · OTP has been sent to a registered user with a COMPLETE profile (name, address, age, gender all filled). OTP field is visible on Login screen
# STATUS: MANUAL REVIEW — contains steps not fully automatable
# Preconditions
- launchApp:
    clearState: false
- runFlow: ../../helpers/ensure-logged-out.yaml

# Test steps (from manual case — adjust selectors if UI changes)
- tapOn:
    id: "login-otp-input"
- inputText: ${STAGING_OTP}
- tapOn:
    id: "login-submit-button"
# Wait for navigation — the app should transition away from Login.
# Confirm you see the bottom tab bar with 5 tabs (Home, Work, People, Activity, Profile).

# Assertions
# Expected: OTP is accepted without error.
# Expected: App navigates to the main app (/(tabs)) — NOT stuck on Login.
- assertVisible:
    id: "tab-home"
- assertVisible:
    id: "tab-profile"
# Expected: Home tab is selected by default.
# Expected: User remains logged in if app is killed and reopened (session persisted).

# Cleanup
