appId: com.kumarabhishek404.labourapp
env:
  STAGING_OTP: ${STAGING_OTP}
  WORKER_MOBILE: ${WORKER_MOBILE}
  EMPLOYER_MOBILE: ${EMPLOYER_MOBILE}
  MEDIATOR_MOBILE: ${MEDIATOR_MOBILE}
  ADMIN_MOBILE: ${ADMIN_MOBILE}
tags: ["authentication", "functionality", "guest", "automated"]
---
# TC-AUTH-005: Wrong OTP shows clear error and keeps user on Login
# Module: Authentication | Screen: Login | Role: Guest
# Type: Functionality | Priority: P1
# Route: /screens/auth/login
# Prerequisites: Logged out · OTP has been sent. OTP input field is visible
# Preconditions
- launchApp:
    clearState: false
- runFlow: ../../helpers/ensure-logged-out.yaml

# Test steps (from manual case — adjust selectors if UI changes)
# Send OTP to a valid number.
- tapOn:
    id: "login-otp-input"
- inputText: ${STAGING_OTP}
- tapOn:
    id: "login-submit-button"
# Read any error message shown.

# Assertions
# Expected: An error message appears (e.g. 'Invalid OTP' or similar in Hindi/English).
- assertVisible:
    id: "login-mobile-input"
# Expected: OTP field is cleared or editable so user can retry.
- assertNotVisible: "Something went wrong"

# Cleanup
