appId: com.kumarabhishek404.labourapp
env:
  MOBILE: ${WORKER_MOBILE}
  OTP: "123456"
tags:
  - auth
  - validation
---
- runFlow: ../helpers/ensure-logged-out.yaml
- tapOn:
    id: login-mobile-input
- inputText: ${MOBILE}
- tapOn:
    id: login-submit-button
- extendedWaitUntil:
    visible:
      id: login-otp-input
    timeout: 30000
    optional: true
- runFlow:
    when:
      visible:
        id: login-otp-input
    commands:
      - tapOn:
          id: login-otp-input
      - inputText: ${OTP}
      - tapOn:
          id: login-submit-button
- assertVisible:
    id: login-mobile-input
