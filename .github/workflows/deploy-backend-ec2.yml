# Deploys the API by SSH into your EC2 box: git pull + pnpm install + PM2 restart.
#
# Required GitHub secrets:
#   EC2_HOST          — e.g. 1.2.3.4 or ec2-xx.compute.amazonaws.com
#   EC2_USER          — e.g. ubuntu, ec2-user
#   EC2_SSH_KEY       — full private key (PEM) for SSH auth
#   EC2_DEPLOY_PATH   — absolute path on the server where this repo is cloned (monorepo root)
#
# Optional:
#   EC2_PM2_APP_NAME  — PM2 process name (default: worker-app-api)

name: Deploy Backend (EC2)

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-backend-ec2
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            DEPLOY_PATH="${{ secrets.EC2_DEPLOY_PATH }}"
            PM2_NAME="${{ secrets.EC2_PM2_APP_NAME }}"
            if [ -z "$DEPLOY_PATH" ]; then echo "EC2_DEPLOY_PATH secret is not set"; exit 1; fi
            if [ -z "$PM2_NAME" ]; then PM2_NAME="worker-app-api"; fi
            cd "$DEPLOY_PATH"
            git fetch origin main
            git checkout main
            git reset --hard origin/main
            export NODE_ENV=production
            corepack enable
            corepack prepare pnpm@9.15.0 --activate
            pnpm install --frozen-lockfile
            pnpm --filter @repo/common run build
            if ! command -v pm2 >/dev/null 2>&1; then
              echo "pm2 not found on server; npm i -g pm2 or use systemd."
              exit 1
            fi
            cd "$DEPLOY_PATH/apps/backend"
            if pm2 describe "$PM2_NAME" > /dev/null 2>&1; then
              pm2 restart "$PM2_NAME" --update-env
            else
              pm2 start index.js --name "$PM2_NAME" --update-env
            fi
            pm2 save
