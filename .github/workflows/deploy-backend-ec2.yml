# EC2: git pull + pm2 restart (or pm2 start if the process name does not exist yet).
# Secrets: EC2_HOST, EC2_USER, EC2_DEPLOY_PATH, EC2_SSH_KEY or EC2_SSH_KEY_B64, optional EC2_PM2_APP_NAME, EC2_SSH_KEY_PASSPHRASE
#
# Runs on push to main only if the pushed commit message contains [deploy:all] or [deploy:backend].
# Plain git push does not run this workflow. Use: ./scripts/push-deploy.sh -backend
# Or put [deploy:backend] in your commit message. workflow_dispatch always runs.

name: Deploy Backend (EC2)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-backend-ec2
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' &&
        github.ref == 'refs/heads/main' && (
          contains(github.event.head_commit.message, '[deploy:all]') ||
          contains(github.event.head_commit.message, '[deploy:backend]')
        ))
    runs-on: ubuntu-latest
    steps:
      - name: SSH key
        run: |
          mkdir -p ~/.ssh && KEY=~/.ssh/deploy_key.pem
          if [ -n "${{ secrets.EC2_SSH_KEY_B64 }}" ]; then
            echo "${{ secrets.EC2_SSH_KEY_B64 }}" | base64 -d > "$KEY"
          elif [ -n "${{ secrets.EC2_SSH_KEY }}" ]; then
            echo "${{ secrets.EC2_SSH_KEY }}" > "$KEY"
          else
            echo "Set EC2_SSH_KEY or EC2_SSH_KEY_B64"; exit 1
          fi
          chmod 600 "$KEY"

      - name: Pull & restart
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key_path: /home/runner/.ssh/deploy_key.pem
          passphrase: ${{ secrets.EC2_SSH_KEY_PASSPHRASE }}
          script_stop: true
          script: |
            set -e
            REPO="${{ secrets.EC2_DEPLOY_PATH }}"
            REPO="$(printf '%s' "$REPO" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
            NAME="${{ secrets.EC2_PM2_APP_NAME }}"
            test -n "$REPO" || { echo "Set EC2_DEPLOY_PATH"; exit 1; }
            test -n "$NAME" || NAME="apna-rojgar-backend"
            git config --global --add safe.directory "$REPO" 2>/dev/null || true
            cd "$REPO"
            git pull origin main
            export NODE_ENV=production
            if pm2 describe "$NAME" >/dev/null 2>&1; then
              pm2 restart "$NAME" --update-env
            else
              cd "$REPO/apps/backend"
              pm2 start index.js --name "$NAME" --cwd "$REPO/apps/backend"
            fi
            pm2 save
