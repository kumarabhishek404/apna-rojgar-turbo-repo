# EC2: git pull + pm2 restart. If you add/change npm deps, run pnpm install on the server once or add those commands back here.
# Secrets: EC2_HOST, EC2_USER, EC2_DEPLOY_PATH, EC2_SSH_KEY or EC2_SSH_KEY_B64, optional EC2_PM2_APP_NAME, EC2_SSH_KEY_PASSPHRASE

name: Deploy Backend (EC2)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-backend-ec2
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH key
        run: |
          mkdir -p ~/.ssh && KEY=~/.ssh/deploy_key.pem
          if [ -n "${{ secrets.EC2_SSH_KEY_B64 }}" ]; then
            echo "${{ secrets.EC2_SSH_KEY_B64 }}" | base64 -d > "$KEY"
          elif [ -n "${{ secrets.EC2_SSH_KEY }}" ]; then
            echo "${{ secrets.EC2_SSH_KEY }}" > "$KEY"
          else
            echo "Set EC2_SSH_KEY or EC2_SSH_KEY_B64"; exit 1
          fi
          chmod 600 "$KEY"

      - name: Pull & restart
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key_path: /home/runner/.ssh/deploy_key.pem
          passphrase: ${{ secrets.EC2_SSH_KEY_PASSPHRASE }}
          script_stop: true
          script: |
            set -e
            REPO="${{ secrets.EC2_DEPLOY_PATH }}"
            REPO="$(printf '%s' "$REPO" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
            NAME="${{ secrets.EC2_PM2_APP_NAME }}"
            test -n "$REPO" || { echo "Set EC2_DEPLOY_PATH"; exit 1; }
            test -n "$NAME" || NAME="worker-app-api"
            git config --global --add safe.directory "$REPO" 2>/dev/null || true
            cd "$REPO"
            git pull origin main
            pm2 restart "$NAME" --update-env
            pm2 save
